name: Version Packages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --version

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          title: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version changed
        id: version_check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if [[ "$COMMIT_MSG" != *"Version Packages"* ]]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CURRENT=$(node -p "require('./package.json').version")
          git show HEAD~1:package.json > /tmp/prev-package.json
          PREV=$(node -p "require('/tmp/prev-package.json').version")
          if [ "$CURRENT" != "$PREV" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.version_check.outputs.changed == 'true'
        run: pnpm run build

      - name: Build web extension
        if: steps.version_check.outputs.changed == 'true'
        run: pnpm run web-ext:build

      - name: Find built zip file
        if: steps.version_check.outputs.changed == 'true'
        id: find_zip
        run: |
          ZIP_FILE=$(find web-ext-artifacts -name "*.zip" -type f | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Error: No zip file found in web-ext-artifacts directory"
            ls -la web-ext-artifacts/
            exit 1
          fi
          echo "zip_file=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "Found zip file: $ZIP_FILE"

      - name: Create GitHub Release
        if: steps.version_check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_check.outputs.version }}
          name: Release v${{ steps.version_check.outputs.version }}
          body: |
            Automated release for version ${{ steps.version_check.outputs.version }}.
          files: ${{ steps.find_zip.outputs.zip_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
